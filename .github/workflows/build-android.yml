name: Build RJP Navigator Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean npm
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force

      - name: Install dependencies
        run: npm install --include=dev --no-audit --no-fund --legacy-peer-deps

      - name: Verify Vite
        run: |
          node -e "console.log('vite', require('./node_modules/vite/package.json').version)"
          ./node_modules/.bin/vite --version

      - name: Build WebApp
        run: ./node_modules/.bin/vite build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then npx cap add android; fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Add Android GPS permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path('android/app/src/main/AndroidManifest.xml')
          s = p.read_text(encoding='utf-8')

          # Inserir permissões DEPOIS da abertura <manifest ...>, nunca antes.
          manifest_open = re.search(r'<manifest\b[^>]*>', s)
          if not manifest_open:
              raise SystemExit('AndroidManifest.xml sem tag <manifest> válida')

          insert_after = manifest_open.end()
          items = [
              '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />',
              '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />',
              '<uses-feature android:name="android.hardware.location.gps" android:required="false" />'
          ]

          to_add = [x for x in items if x not in s]
          if to_add:
              s = s[:insert_after] + '\n    ' + '\n    '.join(to_add) + s[insert_after:]

          p.write_text(s, encoding='utf-8')
          PY
          grep -n "ACCESS_.*LOCATION\|hardware.location" $MANIFEST

      - name: Apply RJP Navigator icon
        run: |
          mkdir -p android/app/src/main/res
          cp -R android-res/* android/app/src/main/res/
          sed -i 's#android:icon="@[^"]*"#android:icon="@mipmap/ic_launcher"#' android/app/src/main/AndroidManifest.xml || true
          sed -i 's#android:roundIcon="@[^"]*"#android:roundIcon="@mipmap/ic_launcher"#' android/app/src/main/AndroidManifest.xml || true
          grep -q 'android:roundIcon=' android/app/src/main/AndroidManifest.xml || sed -i 's#android:icon="@mipmap/ic_launcher"#android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher"#' android/app/src/main/AndroidManifest.xml
          find android/app/src/main/res -name 'ic_launcher*' -print

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RJP_Navigator_APK
          path: android/app/build/outputs/apk/debug/*.apk
