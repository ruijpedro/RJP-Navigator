name: Build RJP Navigator Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean previous install
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force

      - name: Install dependencies
        run: npm install --include=dev --no-audit --no-fund --legacy-peer-deps

      - name: Verify Vite
        run: |
          node -e "console.log(require('./node_modules/vite/package.json').version)"
          ./node_modules/.bin/vite --version

      - name: Build WebApp
        run: ./node_modules/.bin/vite build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then npx cap add android; fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: RJP_Navigator_APK
          path: android/app/build/outputs/apk/debug/*.apk
