name: Build RJP Navigator Web

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps
      - name: Build WebApp
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: RJP_Navigator_Web
          path: dist
